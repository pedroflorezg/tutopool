services:

  # ─── n8n ──────────────────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/Bogota
      - WEBHOOK_URL=http://localhost:5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
      # DB interna de n8n → Supabase local
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=host.docker.internal
      - DB_POSTGRESDB_PORT=54322
      - DB_POSTGRESDB_DATABASE=postgres
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=postgres
      # WhatsApp Bridge (proceso Node.js corriendo en el host en puerto 3001)
      - WA_BRIDGE_URL=http://host.docker.internal:3001
    volumes:
      - n8n_data:/home/node/.n8n
      - ./backend/flows:/home/node/flows
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - evolution-api

  # ─── Evolution API (WhatsApp personal) ────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:latest
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=tutopool-evo-2026
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      # Instancia no se elimina al desconectar
      - DEL_INSTANCE=false
      # Almacenamiento en Supabase local (PostgreSQL)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@host.docker.internal:54322/postgres?schema=evolution_api
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      # Desactivar Redis (no está disponible en este entorno)
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
      # QR code en el log (útil en local)
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#059669
    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped

volumes:
  n8n_data:
  evolution_data:
